<script>
        let selectedSuit = null;
        let selectedBid = null;
        let timeLeft = 30;
        const timerBar = document.getElementById('timer-bar');

        // Timer Logic
        const countdown = setInterval(() => {
            timeLeft -= 0.1;
            const percentage = (timeLeft / 30) * 100;
            timerBar.style.width = percentage + '%';
            
            if (timeLeft <= 0) {
                clearInterval(countdown);
                timerBar.style.width = '0%';
                // Logic for timeout could go here
            }
            if (timeLeft < 10) {
                timerBar.classList.remove('bg-secondary-container');
                timerBar.classList.add('bg-error');
                timerBar.style.boxShadow = '0 0 25px #ffb4ab';
            }
        }, 100);

        function selectSuit(el, suit) {
            document.querySelectorAll('.suit-card').forEach(card => {
                card.classList.remove('neon-border-active', 'scale-105', 'bg-surface-container-highest');
                card.classList.add('opacity-40');
            });
            el.classList.add('neon-border-active', 'scale-105', 'bg-surface-container-highest');
            el.classList.remove('opacity-40');
            
            selectedSuit = suit;
            
            const bidSelector = document.getElementById('bid-selector');
            bidSelector.classList.remove('hidden');
            setTimeout(() => {
                bidSelector.classList.remove('opacity-0', 'translate-y-8');
            }, 50);
            
            checkReady();
        }

        function selectBid(el, amount) {
            document.querySelectorAll('.bid-btn').forEach(btn => {
                btn.classList.remove('bg-primary-container', 'text-on-primary-container', 'border-primary', 'scale-110');
                btn.classList.add('bg-surface-container-high');
            });
            el.classList.remove('bg-surface-container-high');
            el.classList.add('bg-primary-container', 'text-on-primary-container', 'border-primary', 'scale-110');
            
            selectedBid = amount;
            checkReady();
        }

        function checkReady() {
            const btn = document.getElementById('submit-bid');
            if (selectedSuit && selectedBid) {
                btn.disabled = false;
                btn.classList.remove('bg-surface-container-highest', 'text-outline', 'cursor-not-allowed', 'opacity-50');
                btn.classList.add('bg-primary-container', 'text-on-primary-container', 'cursor-pointer', 'opacity-100', 'neon-border-active', 'scale-105');
            }
        }

        document.getElementById('submit-bid').addEventListener('click', function() {
            if (this.disabled) return;
            
            this.innerHTML = `<span>BIDS SUBMITTED!</span><span class="material-symbols-outlined fill-icon">check_circle</span>`;
            this.classList.replace('bg-primary-container', 'bg-tertiary-container');
            this.classList.replace('text-on-primary-container', 'text-on-tertiary-container');
            
            // Update UI status
            const status = document.getElementById('self-status');
            const icon = document.getElementById('self-icon');
            status.classList.remove('animate-pulse-gray', 'border-outline-variant');
            status.classList.add('border-primary-container');
            icon.innerText = 'check_circle';
            icon.classList.add('text-primary-container', 'fill-icon');
            
            // Disable other interactions
            document.querySelectorAll('.suit-card, .bid-btn').forEach(el => el.style.pointerEvents = 'none');
            this.disabled = true;
            this.classList.remove('scale-105', 'neon-border-active');
            this.classList.add('scale-95');
        });
    </script>
